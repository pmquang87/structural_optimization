# =============================================================================
# LEGACY (pre-`load_cases`) config format — kept as a MIGRATION EXAMPLE only.
# =============================================================================
# This is the OLD single-case schema oropt used before load cases existed:
#   * the deck stem lived on `model.stem`,
#   * the constrained node lived on `model.disp_node_id`,
#   * the stress/displacement limits lived in a top-level `constraints:` block.
#
# oropt still loads this format: `Config.from_dict` migrates it into ONE load
# case on read (see `oropt.config._migrated_load_cases`), so old configs keep
# working unchanged. Do NOT write new configs this way — use the current
# `load_cases:` schema instead (see `configs/elevator_linkage.yaml`). This file
# exists so the migration path stays exercised and documented.
#
# The paths below are the original machine-locked absolutes; they will not
# resolve on your machine (that is expected for this reference/fixture).
# =============================================================================
or_paths:
  root: C:\OpenRadioss
  starter: exec/starter_win64.exe
  engine: exec/engine_win64_impi.exe
  anim_to_vtk: exec/anim_to_vtk_win64.exe
  th_to_csv: exec/th_to_csv_win64.exe
  cfg_path: hm_cfg_files
  h3d_path: extlib\h3d\lib\win64
  intel_mpi_root: C:\Program Files (x86)\Intel\oneAPI\mpi\latest
run:
  np: 1
  nt: 12
  use_mpi: true
  starter_timeout_s: 60000
  engine_timeout_s: 360000
  kmp_stacksize: 400m
  anim_dt: 1.0
model:
  case_dir: E:\foxcore_data\_MITEB\openradioss\implicit_elevator-linkage\implicit_6kN_elevator-linkage_pull__BC-A\opti_test
  stem: implicit_elevator-linkage        # LEGACY: migrated into load_cases[0].stem
  design_part_id: 60000000
  design_node_min: 60000000
  disp_node_id: 10021367                 # LEGACY: migrated into a disp_constraints entry
  bc_group_id: 60000000
  freeze_group_ids:
  - 99999999
  freeze_node_ids: []
constraints:                             # LEGACY top-level block: migrated per load case
  sigma_allow: 452.0
  d_allow: 5.0
beso:
  evolution_rate: 0.02
  max_add_ratio: 0.01
  filter_radius: 1.25
  history_weight: 0.5
  target_volume_fraction: 0.7
  sensitivity: energy
  blend_weight: 0.5
  max_iter: 15
  convergence_tol: 0.001
  convergence_window: 5
  protect_layers: 2
  contact_protect_dist: 0.0
  # Keep each iteration's deck + final animation + engine listing in
  # work_dir/iter_NNNN/ (skips the ~345 MB restart). Off by default; see README.
  archive_iterations: false
# Run/output folder for scratch, checkpoints and status files. Blank -> default
# to the input deck folder (model.case_dir above); set an explicit path such as
# runs/run01 to keep outputs separate from the source decks.
work_dir: ""
