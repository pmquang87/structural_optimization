# =============================================================================
# PRESET: additive — manufacturing constraints ON (powder-bed-fusion / AM)
# =============================================================================
# Purpose: keep the evolving topology printable on a powder-bed-fusion machine
# (e.g. AlSi10Mg) by turning on the manufacturing constraints — minimum member
# size (no thin slivers) and overhang self-support (no un-supported down-facing
# faces beyond the cone half-angle). Constraints are applied to the alive mask
# each iteration AFTER the optimiser update; all default OFF, so this preset
# opts in explicitly. See the README "Manufacturing constraints" section.
# =============================================================================

or_paths:
  root: C:\OpenRadioss                    # native install root; Docker users set docker.enabled below
  starter: exec/starter_win64.exe
  engine: exec/engine_win64_impi.exe
  anim_to_vtk: exec/anim_to_vtk_win64.exe
  th_to_csv: exec/th_to_csv_win64.exe
  cfg_path: hm_cfg_files
  h3d_path: extlib\h3d\lib\win64
  intel_mpi_root: C:\Program Files (x86)\Intel\oneAPI\mpi\latest

run:
  np: 1                    # native backend MUST be 1
  nt: 12
  use_mpi: true
  starter_timeout_s: 60000
  engine_timeout_s: 360000
  kmp_stacksize: 400m
  anim_dt: 1.0

model:
  case_dir: ./elevator_case
  design_part_id: 60000000
  design_node_min: 60000000
  bc_group_id: 60000000
  freeze_group_ids:
  - 99999999
  freeze_node_ids: []

optimizer: beso

beso:
  evolution_rate: 0.015
  max_add_ratio: 0.01
  filter_radius: 1.25
  history_weight: 0.5
  target_volume_fraction: 0.6
  sensitivity: energy
  blend_weight: 0.5
  max_iter: 100
  convergence_tol: 0.001
  convergence_window: 5
  protect_layers: 2
  contact_protect_dist: 0.0
  archive_iterations: false

# Manufacturing constraints (all OFF by default; turned ON here). Applied in a
# fixed order each iteration after the optimiser update.
manufacturing:
  min_member_layers: 2             # minimum member size: morphological open removes thin features
  # Overhang / self-support: forbid alive elements with no support within a
  # downward cone of half-angle `max_overhang_angle` about the build direction.
  build_direction: [0.0, 0.0, 1.0]  # +z is "up" (the build axis); null -> overhang off
  max_overhang_angle: 45.0         # cone half-angle [deg]; 0 -> off

load_cases:
  - name: pull
    stem: implicit_elevator-linkage
    weight: 1.0
    sigma_allow: 452.0
    disp_constraints:
      - {node_id: 10021367, d_allow: 5.0}

work_dir: ""
