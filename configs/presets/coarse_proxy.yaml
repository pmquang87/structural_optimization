# =============================================================================
# PRESET: coarse_proxy — fast development / dial-in run
# =============================================================================
# Purpose: iterate quickly on a coarse proxy mesh while you tune the setup —
# aggressive removal (large evolution_rate), few iterations, no archiving. NOT a
# production-quality result; use it to shake out paths, group ids and limits
# before committing to a multi-hour final run.
#
# Point `model.case_dir` at your (ideally coarse) deck folder before running.
# =============================================================================

or_paths:
  root: C:\OpenRadioss                    # native install root; Docker users set docker.enabled below
  starter: exec/starter_win64.exe
  engine: exec/engine_win64_impi.exe
  anim_to_vtk: exec/anim_to_vtk_win64.exe
  th_to_csv: exec/th_to_csv_win64.exe
  cfg_path: hm_cfg_files
  h3d_path: extlib\h3d\lib\win64
  intel_mpi_root: C:\Program Files (x86)\Intel\oneAPI\mpi\latest

run:
  np: 1                    # native backend MUST be 1
  nt: 12
  use_mpi: true
  starter_timeout_s: 60000
  engine_timeout_s: 360000
  kmp_stacksize: 400m
  anim_dt: 1.0

model:
  case_dir: ./elevator_case
  design_part_id: 60000000
  design_node_min: 60000000
  bc_group_id: 60000000
  freeze_group_ids:
  - 99999999
  freeze_node_ids: []

optimizer: beso

beso:
  evolution_rate: 0.04           # AGGRESSIVE: remove ~4%/iter to reach target in few iters
  max_add_ratio: 0.02
  filter_radius: 1.5             # a bit larger than element size on a coarse mesh
  history_weight: 0.5
  target_volume_fraction: 0.6
  sensitivity: energy
  blend_weight: 0.5
  max_iter: 20                   # short: this is a dial-in run, not the final design
  convergence_tol: 0.002
  convergence_window: 4
  protect_layers: 2
  contact_protect_dist: 0.0
  archive_iterations: false      # save disk while developing

load_cases:
  - name: pull
    stem: implicit_elevator-linkage
    weight: 1.0
    sigma_allow: 452.0
    disp_constraints:
      - {node_id: 10021367, d_allow: 5.0}

work_dir: ""
