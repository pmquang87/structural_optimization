name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to keep the queue fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full suite on Windows across the supported Python range. Windows is the
  # only platform where the Streamlit AppTest GUI tests are stable, so it runs
  # everything (`pytest -q`), including the GUI/AppTest files.
  test-windows:
    name: Windows full suite (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # gui = streamlit/stpyvista; dev = pytest. Core deps (numpy, scipy,
      # pyvista->vtk, matplotlib, pyyaml) install regardless. Quote the extras
      # so PowerShell (the default shell on windows-latest) passes them as one
      # literal argument.
      - name: Install package and test deps
        run: pip install -e ".[gui,dev]"

      - name: Lint (ruff)
        run: ruff check oropt tests run_gui.py

      - name: Run tests
        run: pytest -q

  # Cross-platform core verification on Ubuntu. This is where the TetGen/path
  # bugs hide. The Streamlit-AppTest GUI tests SEGFAULT on Linux (pandas/pyarrow
  # interaction) and are marked `gui`, so `-m "not gui"` runs the portable core.
  test-ubuntu:
    name: Ubuntu core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test deps
        run: pip install -e ".[gui,dev]"

      - name: Lint (ruff)
        run: ruff check oropt tests run_gui.py

      # Non-GUI subset: the GUI/AppTest tests are marked `gui` and segfault on
      # Linux, so deselect them by marker.
      - name: Run non-GUI tests
        run: pytest -q -m "not gui"

  # Informational type-check. The codebase is annotated but not yet mypy-clean,
  # so this never blocks the build (continue-on-error). One Python is enough.
  mypy:
    name: mypy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package, test deps, and mypy
        run: pip install -e ".[gui,dev]" mypy

      - name: Type-check (mypy)
        continue-on-error: true
        run: mypy oropt

  # Non-gating coverage over the same non-GUI subset as the Ubuntu core leg.
  # Reports term-missing but never fails the build.
  coverage:
    name: coverage (non-gating)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package, test deps, and coverage
        run: pip install -e ".[gui,dev]" pytest-cov

      # Same non-GUI marker deselection as the Ubuntu core leg.
      - name: Run coverage
        continue-on-error: true
        run: pytest -m "not gui" --cov=oropt --cov-report=term-missing
