name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to keep the queue fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # gui = streamlit/stpyvista; dev = pytest. Core deps (numpy, scipy,
      # pyvista->vtk, matplotlib, pyyaml) install regardless. Quote the extras
      # so PowerShell (the default shell on windows-latest) passes them as one
      # literal argument.
      - name: Install package and test deps
        run: pip install -e ".[gui,dev]"

      - name: Run tests
        run: pytest -q
